# ═══════════════════════════════════════════════════════════════
# GitHub Actions — Daily Cron Jobs (miễn phí, chạy 24/7)
# ═══════════════════════════════════════════════════════════════
# Thay vì chạy trên VPS, các job này chạy trên GitHub Actions
# miễn phí, không cần VPS bật 24/7.
#
# Các job:
#   - Daily Algorithm (8AM PDT) — Gửi bài LeetCode qua Discord webhook
#   - Job Scraper (6AM PDT) — Cào jobs mới qua Discord webhook
#   - Answer (11:59PM PDT) — Gửi đáp án nếu chưa giải
#
# Setup:
#   1. Thêm DISCORD_WEBHOOK, ALGO_WEBHOOK_URL, JOB_WEBHOOK_URL vào GitHub Secrets
#   2. Enable Actions trong repo settings
# ═══════════════════════════════════════════════════════════════

name: Daily Cron Jobs

on:
  schedule:
    # Daily Algorithm — 8:00 AM PDT (15:00 UTC)
    - cron: '0 15 * * *'
    # Job Scraper — 6:00 AM PDT (13:00 UTC), 3 lần/ngày
    - cron: '0 13,16,19 * * *'
    # Answer — 11:59 PM PDT (06:59 UTC+1 = 07:59 UTC)
    - cron: '59 7 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  daily-algo:
    name: 🧠 Daily Algorithm
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 15 * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --omit=dev --no-audit --no-fund 2>&1 | tail -5
      
      - name: Send daily algorithm problem
        env:
          ALGO_WEBHOOK_URL: ${{ secrets.ALGO_WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/algo_webhook.js daily

  job-scraper:
    name: 💼 Job Scraper
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13,16,19 * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --omit=dev --no-audit --no-fund 2>&1 | tail -5
      
      - name: Run job scraper
        env:
          JOB_WEBHOOK_URL: ${{ secrets.JOB_WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/job_scraper.js

  send-answer:
    name: 💡 Send Answer
    runs-on: ubuntu-latest
    if: github.event.schedule == '59 7 * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --omit=dev --no-audit --no-fund 2>&1 | tail -5
      
      - name: Send answer
        env:
          ALGO_WEBHOOK_URL: ${{ secrets.ALGO_WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/algo_webhook.js answer
