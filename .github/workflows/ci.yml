name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx prettier --check "**/*.js" "**/*.json" "**/*.md" || true
      - run: npx eslint . --ext .js --max-warnings=50 || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: npm install --legacy-peer-deps
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - run: node --experimental-vm-modules node_modules/jest/bin/jest.js tests/socratic.test.js tests/incident_agent.test.js tests/shadow_review.test.js tests/mood_state.test.js tests/vector_collections.test.js tests/flashcard_generator.test.js tests/groq_provider.test.js tests/datalog_engine.test.js tests/vibe_coding_audit.test.js tests/privileged_agent.test.js tests/code_sandbox.test.js tests/sandbox_security.test.js --no-cache --no-coverage --runInBand --forceExit
        env:
          CI: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Run npm audit
        run: npm audit --production --audit-level=high 2>&1 || true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Diagnose VPS SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || '22' }}
          timeout: 30s
          script: |
            echo "=== VPS SSH Diagnostics ==="
            echo "Hostname: $(hostname)"
            echo "User: $(whoami)"
            echo "--- sshd status ---"
            sudo systemctl status sshd --no-pager 2>&1 || echo "sshd not found"
            echo "--- port 22 ---"
            sudo ss -tlnp | grep :22 || echo "Nothing listening on :22"
            echo "--- firewall ---"
            sudo ufw status 2>&1 || echo "ufw not installed"
            echo "--- authorized_keys ---"
            wc -l ~/.ssh/authorized_keys 2>&1 || echo "No authorized_keys"
            echo "--- disk ---"
            df -h / | tail -1
            echo "--- memory ---"
            free -h | head -2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || '22' }}
          timeout: 300s
          command_timeout: 300s
          debug: true
          script: |
            set -e
            echo "=== Deploy at $(date) ==="

            if [ ! -d ~/ai-brain ]; then
              git clone https://github.com/realBoBao/Serena_Project00_Auto-Teaching.git ~/ai-brain
            fi

            cd ~/ai-brain
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Node: $(node --version)"

            echo "Python deps..."
            pip3 install -r requirements.txt 2>/dev/null || true

            echo "Node deps..."
            npm install --legacy-peer-deps --no-audit --no-fund

            echo "PM2 reload..."
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            echo "✅ Deploy complete"
