name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npx prettier --check "**/*.js" "**/*.json" "**/*.md" || true
      - run: npx eslint . --ext .js --max-warnings=50 || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: npm install --legacy-peer-deps
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - run: node --experimental-vm-modules node_modules/jest/bin/jest.js tests/socratic.test.js tests/incident_agent.test.js tests/shadow_review.test.js tests/mood_state.test.js tests/vector_collections.test.js tests/flashcard_generator.test.js tests/groq_provider.test.js tests/datalog_engine.test.js tests/vibe_coding_audit.test.js tests/privileged_agent.test.js tests/code_sandbox.test.js tests/sandbox_security.test.js --no-cache --no-coverage --runInBand --forceExit
        env:
          CI: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Run npm audit
        run: npm audit --production --audit-level=high 2>&1 || true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || '22' }}
          timeout: 300s
          script: |
            set -e
            echo "=== Starting deployment at $(date) ==="

            if [ ! -d ~/ai-brain ]; then
              echo "📁 Cloning project..."
              git clone https://github.com/realBoBao/Serena_Project00_Auto-Teaching.git ~/ai-brain
            fi

            cd ~/ai-brain

            echo "📥 Syncing latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "🔧 Checking Node version..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20 2>/dev/null || true
            node --version

            echo "🐍 Installing Python dependencies..."
            if ! command -v pip3 &> /dev/null; then
              sudo apt-get install -y -qq python3-pip
            fi
            pip3 install -r requirements.txt || echo "⚠️ Python deps skipped"

            echo "📦 Installing Node dependencies..."
            npm install --legacy-peer-deps --no-audit --no-fund

            echo "🔧 Rebuilding native modules..."
            if ! command -v g++ &> /dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3
            fi
            npm rebuild || echo "⚠️ npm rebuild failed"

            echo "🔄 Reloading PM2..."
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save

            echo "✅ Deployment complete at $(date)"
